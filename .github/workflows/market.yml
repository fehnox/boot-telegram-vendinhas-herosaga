name: Market Monitor

on:
  schedule:
    # Ajustes futuros do cron:
    # - 1 minuto:  "* * * * *"
    # - 2 minutos: "*/2 * * * *"
    # - 3 minutos: "*/3 * * * *" (atual)
    # - 10 minutos: "*/10 * * * *"
    - cron: "*/3 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate GitHub Secrets
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Missing TOKEN or CHAT_ID GitHub secret" >&2
            exit 1
          fi

      - name: Run market monitor
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot.py

      - name: Persist history changes
        if: success()
        run: |
          if git diff --quiet -- data/history.json; then
            echo "No history changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          git commit -m "chore: update market history"
          git push origin HEAD:${{ github.ref_name }}